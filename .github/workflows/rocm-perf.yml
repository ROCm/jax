name: ROCm DLM Performance Evaluations

on:
  push:

jobs:
  build-and-test-jax:
    runs-on: mi-250
    strategy:
      matrix:
        python: ["3.10"]
        rocm: ["6.3.4"]
    env:
      BASE_IMAGE: "ubuntu:22.04"
      TEST_IMAGE: ubuntu-jax-${{ github.run_id }}_${{ github.run_number }}_${{ github.run_attempt }}
      PYTHON_VERSION: ${{ matrix.python }}
      ROCM_VERSION: ${{ matrix.rocm }}
      WORKSPACE_DIR: jax_rocm_perf_${{ github.run_id }}_${{ github.run_number }}_${{ github.run_attempt }}

    steps:
      - name: Clean up old runs
        run: |
          set -e
          echo "Cleaning up old workdirs..."
          docker run -v "$(pwd):/jax" ubuntu /bin/bash -c "chown -R $UID /jax/jax_rocm_perf_* || true"
          rm -rf jax_rocm_perf_* || true
          ls -l

      - name: Print system info
        run: |
          echo "System Info:"
          whoami
          printenv
          df -h
          rocm-smi || true

      - name: Checkout JAX source
        uses: actions/checkout@v4
        with:
          path: ${{ env.WORKSPACE_DIR }}

      - name: Build JAX Docker Image
        run: |
          set -euxo pipefail
          (
            cd $WORKSPACE_DIR
            python3 build/rocm/ci_build \
              --rocm-version "$ROCM_VERSION" \
              --base-docker "$BASE_IMAGE" \
              --python-versions "$PYTHON_VERSION" \
              --compiler=clang \
              dist_docker \
              --image-tag "$TEST_IMAGE"
          )

      - name: Checkout MaxText source
        uses: actions/checkout@v4
        with:
          repository: ROCm/maxtext
          ref: rv_jax
          path: ${{ env.WORKSPACE_DIR }}/maxtext

      - name: Launch container in background
        run: |
          set -euxo pipefail
          docker run -it -d --name maxtext_container \
            --network=host \
            --device=/dev/kfd \
            --device=/dev/dri \
            --ipc=host \
            --shm-size=64G \
            --group-add=video \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v "$(pwd)/${{ env.WORKSPACE_DIR }}/maxtext:/maxtext" \
            -w /maxtext \
            "$TEST_IMAGE" \
            tail -f /dev/null

      - name: Run MaxText training via docker exec
        run: |
          set -euxo pipefail
          docker exec maxtext_container bash -c "python3 -m pip install -r requirements.txt"
          docker exec maxtext_container bash -c "python3 -m MaxText.train MaxText/configs/models/gpu/llama2_7b_rocm.yml"

      - name: Cleanup container
        # Ensure that this runs even if the training fails.
        if: always()
        run: |
          docker stop maxtext_container || true
          docker rm maxtext_container || true
